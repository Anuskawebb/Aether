services:
  - type: web
    name: toro-watcher
    runtime: node
    rootDir: watcher
    plan: free
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: UPSTASH_REDIS_REST_URL
        sync: false
      - key: UPSTASH_REDIS_REST_TOKEN
        sync: false
      - key: FOLLOWER_REGISTRY_ADDRESS
        sync: false
      - key: VAULT_MANAGER_ADDRESS
        sync: false
      - key: AUSDC_ADDRESS
        sync: false
      - key: KEEPER_PRIVATE_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: DEFAULT_COPY_PCT
        value: "20"
